<body>

  <main id="main-content">

    <section class="page-section-top">
      <div class="container">
        <div class="page-header">
          <h1>COMMUNITY</h1>
          <p class="subtitle">Search and join the communities that fit your programme, college, level or hall</p>
        </div>
        <input class="searchbar" id="group-search" type="text" placeholder="Search by category, group name, or notes"
          aria-label="Search WhatsApp groups" />
        <div id="groups-loading" role="status" aria-live="polite" aria-label="Loading groups"></div>
        <div class="wa-grid" id="groups-grid"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <span class="footer-brand">ABEDNEGO LOMAZAH</span>
    <ul class="footer-links">
      <li><a href="resources.html">Resources</a></li>

      <li><a href="updates.html">Updates</a></li>
    </ul>
  </footer>

  <script src="assets/js/cms.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
    const GROUPS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSanJxg3Q83z1Cr0PpY2rSAY9yUNc3YWYmrpj3v-hNQmDyd1TYLlDYiYKVRGAohiM1kkChDLIkmfooI/pub?gid=497908091&single=true&output=csv';
    const groupsGrid = document.getElementById('groups-grid');
    const groupSearch = document.getElementById('group-search');
    const groupsLoading = document.getElementById('groups-loading');
    let allGroups = [];
    window.cms.injectSkeletons(groupsLoading, 'compact', 6);

    function renderGroups(groups) {
      const grouped = groups.reduce((acc, group) => {
        const category = group.category || 'General';
        if (!acc[category]) acc[category] = [];
        acc[category].push(group);
        return acc;
      }, {});

      groupsGrid.innerHTML = Object.keys(grouped).length
        ? Object.entries(grouped).map(([category, items]) => `
          <div style="grid-column: 1 / -1;">
            <h3 class="section-title" style="font-size: 1.4rem; margin-bottom: 0.8rem;">${category}</h3>
            <div class="wa-grid">
              ${items.map((group) => `
                <article class="wa-card" data-search="${(group.category + ' ' + group.name + ' ' + group.notes).toLowerCase()}">
                  <div class="wa-card-icon">💬</div>
                  <h3>${group.name || 'WhatsApp Group'}</h3>
                  <p>${group.notes || 'Join the community to get updates and resources.'}</p>
                  ${group.link && !window.cms.isPlaceholderValue(group.link) ? `<a href="${group.link}" target="_blank" rel="noopener" class="wa-btn">Join Group →</a>` : '<span class="filter-chip" style="display:inline-block; margin-top:0.2rem;">Link unavailable</span>'}
                </article>`).join('')}
            </div>
          </div>`).join('')
        : `<div class="empty-state" role="status">
             <div style="font-size:1.6rem;margin-bottom:0.4rem;">🔍</div>
             <strong>No groups match your search.</strong>
             <p style="margin-top:0.3rem;font-size:0.85rem;color:var(--brown-mid);">Try a different keyword or clear the search field.</p>
           </div>`;
    }

    function applySearch(query) {
      const normalized = query.toLowerCase();
      const filtered = allGroups.filter((group) => {
        const haystack = `${group.category} ${group.name} ${group.notes}`.toLowerCase();
        return haystack.includes(normalized);
      });
      renderGroups(filtered);
    }

    groupSearch.addEventListener('input', (event) => applySearch(event.target.value));

    async function init() {
      try {
        const rows = await window.cms.fetchCSV(GROUPS_CSV);
        allGroups = rows.map((row) => ({
          category: row[0] || '',
          name: row[1] || '',
          link: row[2] || '',
          notes: row[3] || ''
        })).filter((group) => group.name && !window.cms.isPlaceholderValue(group.name));
        renderGroups(allGroups);
        groupsLoading.style.display = 'none';
      } catch (error) {
        console.error(error);
        window.cms.showErrorState(groupsLoading, 'community groups', init, 'compact');
      }
    }

    init();
    });
  </script>
</body>
