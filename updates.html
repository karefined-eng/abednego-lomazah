  <main id="main-content">

    <section class="page-section-top">
      <div class="container">
        <div class="page-header">
          <h1>ADVOCACY TRACKER</h1>
          <p class="subtitle">Get informed about updates and upcoming tutorials.</p>
        </div>
        <div id="tracker-loading" role="status" aria-live="polite" aria-label="Loading tracker"></div>
        <div class="cards-grid" id="tracker-grid"></div>
        <div id="tutorials-loading" role="status" aria-live="polite" aria-label="Loading tutorials"></div>

  <script src="assets/js/cms.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
    const GUIDES_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSanJxg3Q83z1Cr0PpY2rSAY9yUNc3YWYmrpj3v-hNQmDyd1TYLlDYiYKVRGAohiM1kkChDLIkmfooI/pub?gid=618976969&single=true&output=csv';
    const TUTORIALS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSanJxg3Q83z1Cr0PpY2rSAY9yUNc3YWYmrpj3v-hNQmDyd1TYLlDYiYKVRGAohiM1kkChDLIkmfooI/pub?gid=508134725&single=true&output=csv';
    const trackerGrid = document.getElementById('tracker-grid');
    const tutorialsGrid = document.getElementById('tutorials-grid');
    const trackerLoading = document.getElementById('tracker-loading');
    const tutorialsLoading = document.getElementById('tutorials-loading');

    window.cms.injectSkeletons(trackerLoading, 'compact', 3);
    window.cms.injectSkeletons(tutorialsLoading, 'compact', 3);

    async function init() {
      try {
        const guideRows = await window.cms.fetchCSV(GUIDES_CSV);
        const tutorialRows = await window.cms.fetchCSV(TUTORIALS_CSV);

        const tracker = guideRows.map((row) => ({
          date: row[0] || '',
          type: row[1] || '',
          title: row[2] || '',
          summary: row[3] || '',
          status: row[4] || '',
          sourceLink: row[5] || ''
        })).filter((item) => item.title && !window.cms.isPlaceholderValue(item.title));

        const tutorials = tutorialRows.map((row) => ({
          date: row[0] || '',
          time: row[1] || '',
          title: row[2] || '',
          platform: row[3] || '',
          platformLink: row[4] || '',
          whatsappLink: row[5] || '',
          notes: row[6] || ''
        })).filter((tutorial) => tutorial.title && !window.cms.isPlaceholderValue(tutorial.title));

        trackerGrid.innerHTML = tracker.length
          ? tracker.map((item) => `
            <article class="card compact-card">
              <div class="course-code">${item.type || 'Advocacy'}</div>
              <h3 class="course-name">${item.title}</h3>
              <p class="course-desc">${item.summary || 'More details will be shared soon.'}</p>
              <p class="course-desc"><strong>Status:</strong> <span class="badge ${String(item.status).toLowerCase().replace(/\s+/g, '-') || 'ongoing'}">${item.status || 'Ongoing'}</span></p>
              ${item.date && !window.cms.isPlaceholderValue(item.date) ? `<p class="course-desc"><strong>Date:</strong> ${item.date}</p>` : ''}
            </article>`).join('')
          : '<div class="empty-state">No advocacy updates are currently published.</div>';

        tutorialsGrid.innerHTML = tutorials.length
          ? tutorials.map((item) => `
            <article class="card compact-card">
              <div class="course-code">${item.date && !window.cms.isPlaceholderValue(item.date) ? item.date : 'Date to be announced'}</div>
              <h3 class="course-name">${item.title}</h3>
              <p class="course-desc">${item.notes || 'More details will be shared soon.'}</p>
              <div class="course-open">${item.platform || 'Platform'}</div>
              ${item.platformLink && window.cms.isUsableLink(item.platformLink) ? `<p style="margin-top:0.6rem;"><a href="${item.platformLink}" target="_blank" rel="noopener">Open platform link</a></p>` : ''}
              ${item.whatsappLink && window.cms.isUsableLink(item.whatsappLink) ? `<p style="margin-top:0.3rem;"><a href="${item.whatsappLink}" target="_blank" rel="noopener">Join WhatsApp channel</a></p>` : ''}
            </article>`).join('')
          : '<div class="empty-state">No tutorials are currently published.</div>';

        trackerLoading.style.display = 'none';
        tutorialsLoading.style.display = 'none';
      } catch (error) {
        console.error(error);
        window.cms.showErrorState(trackerLoading, 'advocacy tracker', init, 'compact');
        window.cms.showErrorState(tutorialsLoading, 'tutorials', init, 'compact');
      }
    }

    init();
    });
  </script>
</body>
