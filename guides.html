  <script src="assets/js/cms.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
    const GUIDES_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSanJxg3Q83z1Cr0PpY2rSAY9yUNc3YWYmrpj3v-hNQmDyd1TYLlDYiYKVRGAohiM1kkChDLIkmfooI/pub?gid=618976969&single=true&output=csv';
    const guidesList = document.getElementById('guides-list');
    const guideSearch = document.getElementById('guide-search');
    const guidesLoading = document.getElementById('guides-loading');
    let allGuides = [];
    window.cms.injectSkeletons(guidesLoading, 'gallery', 6);

    function getGuideImage(title) {
      const imageMap = {
        'WiFi Connectivity on Campus': 'assets/petitions/2026-06-19 petition for the improvement of wifi connectivity in the traditional halls.jpg',
        'Course Registration Deadline Extension': 'assets/petitions/2026-06-16 petition for course registration deadline extension.jpg',
        'Exam Hall Belongings Security': 'assets/petitions/2026-06-30 petition on the inadequate security measures for students valuables at examiniation centers.jpg',
        'Transportation Fares On Campus': 'assets/petitions/2026.06.30 address on transportation fares.jpg',
        'Supplementary Resit Timetable Distribution': 'assets/guides/notice on suplementary resit registration.jpg',
        'Student Data / Internet Connectivity': 'assets/petitions/2026-06-19 request for the immediate attention to the poor wifi connectivity issues in the 24hr reading room.jpg',
        'How to Prepare for Science Course Finals (CHEM113 / PHYS143 / ABCS101 / MATH101)': 'assets/petitions/2026.07.02 organic chemistry pre ia tutorials on teams.jpg',
        'How to Prepare for Your UGRC IA': 'assets/petitions/2026.07.04 african studies pre-ia tutorial on zoom.jpg',
        'Free Tutorial Sessions (Zoom / Teams)': 'assets/petitions/2026.07.04  african studies pre ai tutorial on teams.jpg'
      };
      return imageMap[title];
    }

    function renderGuides(guides) {
      guidesList.innerHTML = guides.length
        ? guides.map((guide) => {
          const guideImage = getGuideImage(guide.title);
          const encodedImagePath = guideImage ? guideImage.split('/').map(p => encodeURIComponent(p)).join('/') : null;
          return `
          <article class="gallery-item" data-search="${(guide.title + ' ' + guide.type + ' ' + guide.summary + ' ' + guide.status).toLowerCase()}">
            ${encodedImagePath ? `<img src="${encodedImagePath}" alt="${guide.title}" class="guide-thumbnail">` : `<div class="course-icon">📝</div>`}
            <div class="course-code">${guide.type || 'Guide'}</div>
            <h4>${guide.title || 'Guide'}</h4>
            <p>${guide.summary || 'No summary provided.'}</p>
            <p style="margin-top: 0.6rem;"><strong>Status:</strong> ${guide.status || 'Unknown'}</p>
            ${guide.date && !window.cms.isPlaceholderValue(guide.date) ? `<p style="margin-top: 0.3rem;"><strong>Date:</strong> ${guide.date}</p>` : ''}
          </article>`;
        }).join('')
        /* Tip #4: Improved "no results" empty state */
        : `<div class="empty-state" role="status">
             <div style="font-size:1.6rem;margin-bottom:0.4rem;">🔍</div>
             <strong>No guides match your search.</strong>
             <p style="margin-top:0.3rem;font-size:0.85rem;color:var(--brown-mid);">Try a different keyword or clear the search field.</p>
           </div>`;

      const summary = document.getElementById('guide-summary');
      if (summary) {
        const query = guideSearch.value.trim();
        const count = guides.length;
        summary.textContent = query
          ? `${count} ${count === 1 ? 'guide' : 'guides'} match "${query}".`
          : `${allGuides.length} ${allGuides.length === 1 ? 'guide is' : 'guides are'} available.`;
      }
    }

    function applySearch(query) {
      const normalized = query.toLowerCase();
      const filtered = allGuides.filter((guide) => {
        const haystack = `${guide.title} ${guide.type} ${guide.summary} ${guide.status}`.toLowerCase();
        const keywords = normalized.split(' ').filter(Boolean);
        return keywords.every(keyword => haystack.includes(keyword));
      });
      renderGuides(filtered);
    }

    guideSearch.addEventListener('input', window.cms.debounce((event) => applySearch(event.target.value), 300));

    const lightbox = document.getElementById('image-lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxClose = document.getElementById('lightbox-close');
    const lightboxShare = document.getElementById('lightbox-share');

    guidesList.addEventListener('click', (e) => {
      if (e.target.classList.contains('guide-thumbnail')) {
        lightboxImg.src = e.target.getAttribute('src');
        lightboxImg.alt = e.target.getAttribute('alt');
        lightboxImg.classList.remove('zoomed');
        lightbox.classList.add('active');
      }
    });

    lightboxClose.addEventListener('click', () => {
      lightbox.classList.remove('active');
    });

    lightboxImg.addEventListener('click', () => {
      lightboxImg.classList.toggle('zoomed');
    });

    lightboxShare.addEventListener('click', async () => {
      try {
        if (navigator.share) {
          const url = new URL(lightboxImg.getAttribute('src'), window.location.origin).href;
          await navigator.share({ title: lightboxImg.alt, url: url });
        } else {
          alert('Sharing is not supported on this browser.');
        }
      } catch (err) {
        console.error('Share failed:', err);
      }
    });



    async function init() {
      try {
        const rows = await window.cms.fetchCSV(GUIDES_CSV);
        allGuides = rows.map((row) => ({
          date: row[0] || '',
          type: row[1] || '',
          title: row[2] || '',
          summary: row[3] || '',
          status: row[4] || '',
          sourceLink: row[5] || ''
        })).filter((guide) => guide.title && !window.cms.isPlaceholderValue(guide.title));
        renderGuides(allGuides);
        guidesLoading.style.display = 'none';
      } catch (error) {
        console.error(error);
        window.cms.showErrorState(guidesLoading, 'guides', init, 'gallery');
      }
    }

    init();
    });
  </script>
