<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="sitemap" type="application/xml" title="Sitemap" href="sitemap.xml" />
  <title>Guides | Abednego Lomazah</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/site.css" />
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-logo">Abednego Lomazah</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="resources.html">Resources</a></li>
      <li><a href="community.html">Community</a></li>
      <li><a href="guides.html" class="active">Guides</a></li>
      <li><a href="updates.html">Updates</a></li>
    </ul>
  </nav>

  <section class="page-section-top">
    <div class="container">
      <div class="page-header">
        <h2>HOW-TO GUIDES</h2>
        <p class="subtitle">Search the latest step-by-step guides from the live Google Sheet data.</p>
      </div>
      <input class="searchbar" id="guide-search" type="text" placeholder="Search by title, summary, or type" />
      <div class="loading" id="guides-loading">Loading guides...</div>
      <div class="gallery-grid" id="guides-list"></div>
    </div>
  </section>

  <footer class="footer">
    <span class="footer-brand">ABEDNEGO LOMAZAH</span>
    <ul class="footer-links">
      <li><a href="resources.html">Resources</a></li>
      <li><a href="community.html">Community</a></li>
      <li><a href="updates.html">Updates</a></li>
    </ul>
  </footer>

  <script src="assets/js/cms.js"></script>
  <script>
    const GUIDES_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSanJxg3Q83z1Cr0PpY2rSAY9yUNc3YWYmrpj3v-hNQmDyd1TYLlDYiYKVRGAohiM1kkChDLIkmfooI/pub?gid=618976969&single=true&output=csv';
    const guidesList = document.getElementById('guides-list');
    const guideSearch = document.getElementById('guide-search');
    const guidesLoading = document.getElementById('guides-loading');
    let allGuides = [];

    function renderGuides(guides) {
      guidesList.innerHTML = guides.length
        ? guides.map((guide) => `
          <article class="gallery-item" data-search="${(guide.title + ' ' + guide.type + ' ' + guide.summary + ' ' + guide.status).toLowerCase()}">
            <div class="course-icon">📝</div>
            <div class="course-code">${guide.type || 'Guide'}</div>
            <h4>${guide.title || 'Guide'}</h4>
            <p>${guide.summary || 'No summary provided.'}</p>
            <p style="margin-top: 0.6rem;"><strong>Status:</strong> ${guide.status || 'Unknown'}</p>
            ${guide.date && !window.cms.isPlaceholderValue(guide.date) ? `<p style="margin-top: 0.3rem;"><strong>Date:</strong> ${guide.date}</p>` : ''}
          </article>`).join('')
        : '<div class="empty-state">No guides match your search.</div>';
    }

    function applySearch(query) {
      const normalized = query.toLowerCase();
      const filtered = allGuides.filter((guide) => {
        const haystack = `${guide.title} ${guide.type} ${guide.summary} ${guide.status}`.toLowerCase();
        return haystack.includes(normalized);
      });
      renderGuides(filtered);
    }

    guideSearch.addEventListener('input', (event) => applySearch(event.target.value));

    async function init() {
      try {
        const rows = await window.cms.fetchCSV(GUIDES_CSV);
        allGuides = rows.map((row) => ({
          date: row[0] || '',
          type: row[1] || '',
          title: row[2] || '',
          summary: row[3] || '',
          status: row[4] || '',
          sourceLink: row[5] || ''
        })).filter((guide) => guide.title && !window.cms.isPlaceholderValue(guide.title));
        renderGuides(allGuides);
        guidesLoading.style.display = 'none';
      } catch (error) {
        console.error(error);
        guidesLoading.textContent = 'Failed to load guides.';
      }
    }

    init();
  </script>
</body>
</html>
